worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # Загрузка фото (спека §13 «Фаза 4», обновлено при добавлении до 4 фото за
  # раз): @fastify/multipart ограничивает КАЖДЫЙ файл 20 МБ
  # (backend/src/server.ts), а /api/photo/detect принимает до 4 файлов в
  # одном запросе (backend/src/routes/photo.ts) — лимит здесь должен
  # покрывать все файлы разом (4 × 20 МБ), а не один файл, иначе прокси
  # обрежет запрос раньше, чем это сделает сам бэкенд. 85m — с запасом сверх
  # 80 МБ на multipart-накладные расходы (границы, заголовки частей).
  client_max_body_size 85m;

  server {
    listen 80;
    server_name aishef.xyz;

    # ACME HTTP-01 (Let's Encrypt, Фаза D4): webroot-способ (находка №6
    # промпта D3-D5) — certbot кладёт файл-челлендж в общий volume
    # "certbot-www" (docker-compose.prod.yml), nginx отдаёт его отсюда, не
    # останавливаясь ни при первом выпуске, ни при последующих продлениях.
    # Остаётся в 80-блоке и после включения редиректа ниже — иначе продление
    # сломается (challenge должен ходить по чистому HTTP, без редиректа).
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Всё остальное — на HTTPS (находка №6/Фаза D4).
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name aishef.xyz;

    ssl_certificate     /etc/letsencrypt/live/aishef.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aishef.xyz/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Прокси на бэкенд (docker-compose.prod.yml, сервис "backend", порт 3000
    # внутри Compose-сети — наружу backend порт не публикует, доступ только
    # отсюда). proxy_pass копирует ВСЕ клиентские заголовки, включая
    # анонимный `x-user-id` (спека §9), без явного proxy_set_header — это
    # штатное поведение nginx для заголовков, которые не переопределяются
    # ниже явно; проверено эмпирически при локальной верификации Фазы D2, не
    # только по документации.
    location /api/ {
      # Без URI-части в proxy_pass — исходный путь (включая /api/...)
      # передаётся бэкенду без переписывания, ровно как зарегистрированы
      # маршруты в backend/src/routes/*.ts.
      proxy_pass http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Найдено на Фазе D5 на боевом VPS с 968 МБ RAM (ниже рекомендованных
      # спекой ≥2 ГБ): первый запрос к семантическому матчингу
      # (services/matching.ts → embed()) после каждого рестарта backend
      # холодно грузит модель LaBSE и наблюдаемо занимает ~3 минуты на этом
      # железе — стандартный nginx proxy_read_timeout 60s обрывал запрос
      # раньше, чем бэкенд успевал вернуть свой собственный корректный ответ
      # (в т.ч. 503 AI_*_UNAVAILABLE), подменяя его голым 504 от nginx.
      proxy_connect_timeout 10s;
      proxy_send_timeout 240s;
      proxy_read_timeout 240s;
    }

    # SPA-fallback (react-router): любой путь без совпадения по файлу →
    # index.html, роутинг на клиенте.
    location / {
      try_files $uri /index.html;
    }
  }
}
